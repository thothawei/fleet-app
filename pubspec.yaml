name: line_fleet_app
description: "LINE 叫車派遣 — 司機/乘客雙端 Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  flutter_secure_storage: ^9.2.4
  web_socket_channel: ^3.0.3
  geolocator: ^14.0.2
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.5
  geocoding: ^3.0.0
  web: ^1.1.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_map: ^8.3.1
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  # 在真模擬器/裝置上驅動 UI（點擊由 Flutter 自己派送，不需要系統層的合成滑鼠事件）。
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# 叫車 App icon（品牌綠 #06C755 + 白色計程車）。driver/customer 兩個 flavor 共用。
# 產生指令：dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#06C755"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
